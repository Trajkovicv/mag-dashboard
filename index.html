.kg{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:20px}

.btn{padding:8px 18px;border-radius:8px;font:600 13px/1 var(--font);cursor:pointer;transition:.15s;border:none}

.ph:hover{box-shadow:var(--shadow-lg)}.ph.act{border:2px solid var(--teal);background:var(--teal-light)}
.co{padding:14px 20px;border-radius:var(--radius);border-left:4px solid;display:flex;align-items:flex-start;gap:12px;margin-bottom:20px}
.gn{width:30px;height:30px;border-radius:8px;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0}
.chk{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-size:13px;color:var(--text2);cursor:pointer}
.chk input[type=checkbox]{width:18px;height:18px;accent-color:var(--teal);flex-shrink:0;cursor:pointer}
.chk.done .e{text-decoration:line-through;opacity:.5}
.pb{display:flex;align-items:center;margin-bottom:24px}
.pd{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0}
.pd.on{background:var(--teal);color:#fff;box-shadow:0 0 0 4px rgba(13,148,136,.2)}.pd.off{background:#e2e8f0;color:#94a3b8}
.pl{flex:1;height:3px;margin:0 4px}
.sg{display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:600px}
.sg label{display:block;font:700 10px/1 var(--font);color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.sg input{width:100%;padding:9px 14px;border-radius:8px;border:1.5px solid var(--border);font:14px/1.4 var(--font);color:var(--text);outline:0;transition:.2s}
.sg input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.08)}
.section{display:none}.section.active{display:block;animation:fadeIn .3s ease}

.gap-card{padding:14px 20px;border-radius:var(--radius);flex:1;min-width:200px}
.donut-c{display:flex;align-items:center;gap:40px;flex-wrap:wrap}
.mg{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px}
.mi{display:flex;align-items:center;gap:8px}.md{width:10px;height:10px;border-radius:50%;flex-shrink:0}

MS.forEach((m,i)=>{h+='<tr><td style="font-weight:700;color:var(--blue);padding:10px 12px">'+(i+1)+'</td><td>'+inp(m.w,'','MS['+i+'].w=this.value')+'</td><td>'+inp(m.who,'','MS['+i+'].who=this.value')+'</td><td>'+inp(m.u,'','MS['+i+'].u=this.value')+'</td><td><button class="btn bd bs" onclick="MS.splice('+i+',1);rDev()">'+t('dl')+'</button></td></tr>';});
h+='</tbody></table></div></div>';document.getElementById('r-development').innerHTML=h;}

// ═══ GUIDE ═══
function rGui(){const pk=L==='de'?'pd':'pe',ok=L==='de'?'od':'oe',tk=L==='de'?'td':'te',trk=L==='de'?'td':'te',rek=L==='de'?'rd':'re';
let h='<h2 style="font-size:22px;font-weight:800;color:#0f172a">'+t('g.t')+'</h2><p style="font-size:13px;color:var(--text3);margin:4px 0 18px">'+t('g.s')+'</p>';
h+='<div class="card" style="background:linear-gradient(135deg,#eff6ff,#f0f9ff);border-left:4px solid var(--blue)"><div class="ct" style="color:var(--blue)">'+t('g.c')+'</div>';
cM.forEach((m,i)=>{h+='<div style="display:flex;gap:10px;margin-bottom:10px;align-items:center"><div style="width:28px;height:28px;border-radius:50%;background:var(--blue);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;flex-shrink:0">'+(i+1)+'</div>'+inp(L==='de'?m.de:m.en,'','cM['+i+'][\''+(L==='de'?'de':'en')+'\']=this.value')+'</div>';});h+='</div>';
gP.forEach((g,i)=>{h+='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:8px"><div style="display:flex;align-items:center;gap:10px"><div class="gn">'+(i+1)+'</div>'+inp(g[tk],'','gP['+i+']["'+tk+'"]=this.value')+'</div>'+inp(g.dur,'','gP['+i+'].dur=this.value',)+'</div>';
h+='<div style="margin-bottom:12px;padding:10px 14px;background:#f8fafc;border-radius:8px;border-left:3px solid var(--teal)"><textarea class="e" onchange="gP['+i+'].'+ok+'=this.value">'+esc(g[ok])+'</textarea></div>';
g[pk].forEach((p,pi)=>{h+='<div style="display:flex;gap:8px;margin-bottom:4px;align-items:center"><span style="color:var(--blue);flex-shrink:0">▸</span>'+inp(p,'','gP['+i+'].'+pk+'['+pi+']=this.value')+'<button class="btn bd bs" style="padding:2px 8px" onclick="gP['+i+'].'+pk+'.splice('+pi+',1);rGui()">×</button></div>';});
h+='<button class="btn bo bs" style="margin-top:6px" onclick="gP['+i+'].'+pk+'.push(\'Neuer Punkt\');rGui()">+ Punkt</button></div>';});
h+='<div class="card"><div class="ct">'+t('g.sc')+'</div>';
SC.forEach((s,i)=>{h+='<div style="padding:12px 16px;background:#f8fafc;border-radius:8px;border:1px solid var(--border);margin-bottom:10px">'+inp(s[trk],'','SC['+i+']["'+trk+'"]=this.value')+'<div style="display:flex;gap:6px;align-items:center;margin-top:4px"><span style="color:var(--teal);font-weight:700">→</span>'+inp(s[rek],'','SC['+i+']["'+rek+'"]=this.value')+'</div></div>';});
h+='<button class="btn bo bs" onclick="SC.push({td:\'Neues Szenario\',te:\'New scenario\',rd:\'Antwort\',re:\'Response\'});rGui()">+ Szenario</button></div>';
const cl=L==='de'?cld:cle,clk=L==='de'?'cld':'cle';
h+='<div class="card"><div class="ct">'+t('g.ch')+'</div>';
cl.forEach((item,i)=>{h+='<div class="chk'+(CK[i]?' done':'')+'"><input type="checkbox" '+(CK[i]?'checked':'')+' onchange="CK['+i+']=this.checked;rGui()">'+inp(item,'',clk+'['+i+']=this.value')+'</div>';});
const dn=CK.filter(Boolean).length;h+='<div style="margin-top:12px;padding:10px 16px;background:var(--teal-light);border-radius:8px;font-size:13px;color:var(--teal);font-weight:600">'+dn+'/'+CK.length+' '+t('dn')+'</div></div>';
document.getElementById('r-guide').innerHTML=h;}

// ═══ SETTINGS ═══
function rSet(){let h='<h2 style="font-size:22px;font-weight:800;color:#0f172a;margin-bottom:18px">'+t('x.t')+'</h2><div class="card"><div class="sg">';
[['name','x.n'],['function','x.f'],['team','x.te'],['degree','x.d'],['supervisor','x.su'],['date','x.da']].forEach(([f,lk])=>{h+='<div><label>'+t(lk)+'</label><input value="'+esc(P[f])+'" onchange="P[\''+f+'\']=this.value;uS()"></div>';});
h+='</div></div><div class="card"><div style="display:flex;gap:12px;align-items:center;flex-wrap:wrap"><button class="btn bp" onclick="saveJ()">'+t('x.sv')+'</button><button class="btn bo" onclick="document.getElementById(\'fi\').click()">'+t('x.ld')+'</button><input type="file" id="fi" accept=".json" style="display:none" onchange="loadJ(event)"><span id="ls" style="font-size:12px;color:var(--text3)"></span></div></div>';
h+='<div class="card" style="text-align:center;padding:20px;border-top:3px solid var(--teal)"><div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:4px"><div style="width:8px;height:8px;border-radius:50%;background:var(--teal)"></div><a href="https://www.mitarbeiterdashboard.ch" target="_blank" style="font-size:13px;font-weight:700;color:var(--teal);text-decoration:none">www.mitarbeiterdashboard.ch</a></div><p style="font-size:11px;color:var(--text3)">Professionelle MAG-Vorbereitung · Alle Daten lokal · Keine Cloud</p></div>';
document.getElementById('r-settings').innerHTML=h;}

// ═══ SAVE/LOAD ═══
function saveJ(){const d={P,sK,ST,MD,aK,aN,TK,PH,MS,cM,gP,SC,cld,cle,CK,savedAt:new Date().toISOString()};const b=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='MAG_'+P.name.replace(/\s/g,'_')+'_'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href);const ls=document.getElementById('ls');if(ls)ls.textContent=(L==='de'?'Gespeichert: ':'Saved: ')+new Date().toLocaleString('de-CH');}
function loadJ(e){const f=e.target.files&&e.target.files[0];if(!f)return;const r=new FileReader();r.onload=function(ev){try{const d=JSON.parse(ev.target.result);if(d.P)P=d.P;if(d.sK)sK=d.sK;if(d.ST)ST=d.ST;if(d.MD)MD=d.MD;if(d.aK)aK=d.aK;if(d.aN)aN=d.aN;if(d.TK)TK=d.TK;if(d.PH)PH=d.PH;if(d.MS)MS=d.MS;if(d.cM)cM=d.cM;if(d.gP)gP=d.gP;if(d.SC)SC=d.SC;if(d.cld)cld=d.cld;if(d.cle)cle=d.cle;if(d.CK)CK=d.CK;rAll();uS();const ls=document.getElementById('ls');if(ls&&d.savedAt)ls.textContent=(L==='de'?'Geladen: ':'Loaded: ')+new Date(d.savedAt).toLocaleString('de-CH');}catch(err){alert('Ungültige JSON / Invalid JSON');}};r.readAsText(f);e.target.value='';}

function rAll(){rSal();rAct();rDev();rGui();rSet();uS();const a=document.querySelector('.section.active');if(a&&a.id==='sec-salary')setTimeout(()=>{rCT();rCM()},60);if(a&&a.id==='sec-activity')setTimeout(rCD,60);}
document.addEventListener('DOMContentLoaded',function(){rAll();setTimeout(()=>{rCT();rCM()},150);});
</script>
